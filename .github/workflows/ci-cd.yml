name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format Check (Black)
        run: |
          black --check pipeline_prefect.py model_pipeline.py app.py app_streamlit.py

      - name: Code Linting (Flake8)
        run: |
          flake8 model_pipeline.py app.py app_streamlit.py

      - name: Security Check (Bandit)
        run: |
          bandit -r model_pipeline.py app.py

      - name: Run Unit Tests
        run: |
          pytest test_main.py test_pipeline.py -v

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-docker-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push FastAPI Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: molksaouabi/molk_saouabi_sde_2_mlops_api:latest

      - name: Build and Push Streamlit Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ui
          push: true
          tags: molksaouabi/molk_saouabi_sde_2_mlops_ui:latest

      - name: Build and Push MLflow Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mlflow
          push: true
          tags: molksaouabi/molk_saouabi_sde_2_mlops_mlflow:latest
