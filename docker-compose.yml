services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - .:/mlflow
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    volumes:
      - .:/app
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8080
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    volumes:
      - .:/app
    restart: always
